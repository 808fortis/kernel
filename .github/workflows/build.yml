name: Build Kernel

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  CLANG_VERSION: clang-r416183b
  KERNEL_SOURCE: realme-kernel-opensource/realme_C51_C53_Note50_C60_C51_N53-AndroidU-kernel-source
  GCC_ARM64: aarch64-linux-android-4.9-12-5
  GCC_ARM: arm-linux-androideabi-4.9-12-5

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout this repo (patches & workflow)
        uses: actions/checkout@v4
        with:
          path: ci

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_SOURCE }}
          path: kernel

      - name: Setup swap (30G)
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 30G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          grep -q "vm.swappiness=100" /etc/sysctl.conf || echo "vm.swappiness=100" | sudo tee -a /etc/sysctl.conf

      - name: Cache clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: clang
          key: clang-${{ env.CLANG_VERSION }}

      - name: Setup clang 12
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p clang
          wget -q "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-12.0.0_r12/${CLANG_VERSION}.tar.gz" -O clang.tar.gz
          tar xzf clang.tar.gz -C clang
          rm -f clang.tar.gz

      - name: Cache GCC toolchains
        id: cache-gcc
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GCC_ARM64 }}
            ${{ env.GCC_ARM }}
          key: gcc-4.9-v1

      - name: Setup GCC toolchains
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://github.com/cooked71/${{ env.GCC_ARM64 }}
          git clone --depth=1 https://github.com/cooked71/${{ env.GCC_ARM }}

      - name: Upstream to latest Android 5.4 common kernel
        working-directory: kernel
        continue-on-error: true
        run: |
          git remote add ack https://android.googlesource.com/kernel/common
          git fetch ack android12-5.4-lts --depth=100
          git merge --no-edit FETCH_HEAD
          echo "UPSTREAM_OK=1" >> $GITHUB_ENV

      - name: Re-checkout if upstream failed (conflict)
        if: env.UPSTREAM_OK != '1'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_SOURCE }}
          path: kernel

      - name: Add KOWSU (KernelSU)
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/KOWX712/KernelSU/main/kernel/setup.sh" | bash -

      - name: Fix Kconfig files
        working-directory: kernel
        run: |
          # Remove '+' prefix from config/choice/endchoice lines in hxchipset Kconfig
          sed -i 's/^+config/config/' drivers/input/touchscreen/hxchipset/Kconfig
          sed -i 's/^+choice/choice/' drivers/input/touchscreen/hxchipset/Kconfig
          sed -i 's/^+endchoice/endchoice/' drivers/input/touchscreen/hxchipset/Kconfig
          # Fix hqhardwareinfo Kconfig - use proper prompt string
          sed -i 's/tristate CONFIG_HQ_HARDWARE_INFO/tristate "HQ Hardware Info"/' drivers/misc/hqhardwareinfo/Kconfig
          # Strip non-ASCII characters from all Kconfig files with issues
          for f in drivers/misc/hqhardwareinfo/Kconfig \
                   drivers/input/touchscreen/hxchipset/Kconfig \
                   drivers/input/touchscreen/chipone_icnl__9916c/Kconfig \
                   drivers/input/lcd_bias/Kconfig; do
            [ -f "$f" ] && tr -d '\000-\010\016-\037\200-\377' < "$f" > "${f}.tmp" && mv "${f}.tmp" "$f"
          done

      - name: Apply custom patches
        working-directory: kernel
        run: |
          git apply --ignore-whitespace --recount "${{ github.workspace }}/ci/patches/0001-cpufreq-tune-ondemand-governor.patch"
          git apply --ignore-whitespace --recount "${{ github.workspace }}/ci/patches/0002-thermal-set-limit-75c.patch"

      - name: Set defconfig
        working-directory: kernel
        run: |
          make O=out \
            ARCH=arm64 \
            LLVM=1 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_COMPAT=${{ github.workspace }}/${{ env.GCC_ARM }}/bin/arm-linux-androideabi- \
            PATH="${{ github.workspace }}/clang/bin:${{ github.workspace }}/${{ env.GCC_ARM64 }}/bin:${{ github.workspace }}/${{ env.GCC_ARM }}/bin:${PATH}" \
            sprd_qogirl6_defconfig

      - name: Build kernel
        working-directory: kernel
        run: |
          make O=out \
            ARCH=arm64 \
            LLVM=1 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_COMPAT=${{ github.workspace }}/${{ env.GCC_ARM }}/bin/arm-linux-androideabi- \
            PATH="${{ github.workspace }}/clang/bin:${{ github.workspace }}/${{ env.GCC_ARM64 }}/bin:${{ github.workspace }}/${{ env.GCC_ARM }}/bin:${PATH}" \
            -j$(nproc --ignore=1)

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image-${{ github.run_id }}
          path: |
            kernel/out/arch/arm64/boot/Image.gz
            kernel/out/arch/arm64/boot/Image.gz-dtb
            kernel/out/arch/arm64/boot/dts/**/*.dtb
          if-no-files-found: warn
